name: Build and Release Flutter App

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # needed for proper versioning if you use git tags in app

      # ------------------------------------------------------------------
      # 1. Java + Flutter setup
      # ------------------------------------------------------------------
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.44.0
          channel: stable
          cache: true

      # ------------------------------------------------------------------
      # 2. Cache pub dependencies (huge time saver)
      # ------------------------------------------------------------------
      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool/package_config.json
          key: ${{ runner.os }}-flutter-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-flutter-pub-

      # ------------------------------------------------------------------
      # 4. Create .env file from secrets
      # ------------------------------------------------------------------
      # - name: Create .env file
      #   run: |
      #     cat <<EOF > .env
      #     SUPABASE_URL=${{ secrets.SUPABASE_URL }}
      #     WEB_CLIENT_ID=${{ secrets.WEB_CLIENT_ID }}
      #     ANDROID_CLIENT_ID=${{ secrets.ANDROID_CLIENT_ID }}
      #     SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
      #     EOF

      - name: Flutter pub get
        run: flutter pub get

      # ------------------------------------------------------------------
      # 5. Decode signing keystore (only for AAB)
      # ------------------------------------------------------------------
      - name: Decode and create keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          # echo "$KEYSTORE_BASE64" | base64 --decode > android/app/key.jks
          # echo "$KEYSTORE_BASE64" | base64 --decode > android/key.jks
        run: |
          mkdir -p android/app
          echo "$KEYSTORE_BASE64" | base64 --decode > android/app/key.jks
          cat <<EOF > android/key.properties
          storePassword=$KEYSTORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=key.jks
          EOF

      # ------------------------------------------------------------------
      # 6. Build both APK (split) + AAB in parallel inside the same job
      # ------------------------------------------------------------------
      - name: Build Release APK (split per ABI)
        run: flutter build apk --release --split-per-abi

      - name: Build Release App Bundle (AAB)
        run: flutter build appbundle --release --obfuscate --split-debug-info=build/debug-info --tree-shake-icons
        # run: flutter build appbundle --release

      # ------------------------------------------------------------------
      # 7. Upload artifacts
      # ------------------------------------------------------------------
      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: apk-release
          path: build/app/outputs/flutter-apk/*.apk
          retention-days: 30

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: appbundle-release
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 30

  # ----------------------------------------------------------------------
  # 8. Create GitHub Release (only on real tags)
  # ----------------------------------------------------------------------
  create-release:
    needs: build-android
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          find . -name "*.apk" -o -name "*.aab" | xargs -I {} cp {} release-assets/
          ls -la release-assets/

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.ref_name }}
          name: "مسیریاب مترو تهران ${{ github.ref_name }}"
          body: |
            مسیریاب مترو تهران منتشر شد!

            دانلود برای اندروید:
            • فایل AAB (برای گوگل پلی و مایکت)
            • APKهای جدا شده برای ABIهای مختلف (arm64-v8a, armeabi-v7a, x86_64)

            تغییرات نسخه:
            - بهبود عملکرد
            - رفع باگ های جزئی
            - اضافه شدن ویژگی جدید
          artifacts: "release-assets/*"
          allowUpdates: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: ارسال فایل‌ها به پیام‌رسان بله
        env:
          BALE_TOKEN: ${{ secrets.BALE_TOKEN }}
          BALE_CHAT_ID: ${{ secrets.BALE_CHAT_ID }}
          # مسیر فایل‌های بیلد شده خود را بر اساس ساختار پروژه تنظیم کنید
          APK_PATH: build/app/outputs/flutter-apk/app-release.apk
          AAB_PATH: build/app/outputs/bundle/release/app-release.aab
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          echo "شروع فرآیند ارسال فایل‌ها به بله..."
          
          # تعریف تابع برای ارسال فایل جهت جلوگیری از تکرار کد (DRY)
          send_to_bale() {
            local file_path=$1
            local file_type=$2
            
            if [ -f "$file_path" ]; then
              echo "در حال ارسال فایل $file_type: $file_path"
              
              RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "https://tapi.bale.ai/bot${BALE_TOKEN}/sendDocument" \
                -F "chat_id=${BALE_CHAT_ID}" \
                -F "document=@${file_path}" \
                -F "caption=نسخه جدید بیلد شد 🚀%0Aنوع: ${file_type}%0Aکامیت: ${COMMIT_MSG}")
              
              # جداسازی کد وضعیت HTTP از بدنه پاسخ
              HTTP_STATUS=$(echo "$RESPONSE" | tail -n1)
              BODY=$(echo "$RESPONSE" | sed '$d')
              
              if [ "$HTTP_STATUS" -ge 200 ] && [ "$HTTP_STATUS" -lt 300 ]; then
                echo "✅ ارسال $file_type موفقیت‌آمیز بود. (Status: $HTTP_STATUS)"
              else
                echo "❌ خطا در ارسال $file_type. (Status: $HTTP_STATUS)"
                echo "جزئیات خطا: $BODY"
                exit 1 # توقف اکشن در صورت بروز خطای بحرانی
              fi
            else
              echo "⚠️ فایل $file_type در مسیر مشخص شده یافت نشد: $file_path"
            fi
            echo "----------------------------------------"
          }

          # فراخوانی تابع برای ارسال هر دو فرمت خروجی
          send_to_bale "$APK_PATH" "APK"
          send_to_bale "$AAB_PATH" "AAB"